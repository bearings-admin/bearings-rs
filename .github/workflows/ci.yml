
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check + Test + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # bearings-frontend is the PARKED Phase-3 Leptos stub (see root Cargo.toml).
      # It is excluded from CI so an unfinished crate does not gate every build
      # or bias the open framework decision. Re-include it when that is settled.
      - name: cargo check
        run: cargo check --workspace --exclude bearings-frontend

      - name: cargo test (unit tests in src/ — no Supabase needed)
        # --lib runs #[cfg(test)] modules inside src/ only
        # Integration tests in tests/ are excluded here (need live Supabase)
        run: cargo test --workspace --lib --exclude bearings-frontend

      - name: cargo clippy
        run: cargo clippy --workspace --exclude bearings-frontend -- -D warnings

      - name: cargo fmt check
        run: cargo fmt -p bearings-shared -p bearings-backend -p bearings-agent -- --check

  build-release:
    name: Release Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo build --release
        run: cargo build --release --workspace --exclude bearings-frontend

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: bearings-backend
          path: target/release/bearings-backend

      - name: Upload agent binary
        uses: actions/upload-artifact@v4
        with:
          name: bearings-agent
          path: target/release/bearings-agent
